apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-deployment
  template:
    metadata:
      labels:
        app: api-deployment
    spec:
      automountServiceAccountToken: false
      containers:
        - name: api-deployment
          image: projet_exercice-backend:latest

          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: production

            - name: KAFKA_BROKER
              value: kafka:9092

            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: MYSQL_USER_API

            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: MYSQL_PASSWORD_API

            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: MYSQL_HOST_API

            - name: MYSQL_DB
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: MYSQL_DB_API

          resources: {}
          # resources:
          #   requests:
          #     memory: "128Mi"
          #     cpu: "100m"
          #     ephemeral-storage: "512Mi"
          #   limits:
          #     memory: "256Mi"
          #     cpu: "200m"
          #     ephemeral-storage: "1Gi"

          # livenessProbe:
          #   httpGet:
          #     path: /
          #     port: 3000
          #   initialDelaySeconds: 15
          #   periodSeconds: 20
          # readinessProbe:
          #   httpGet:
          #     path: /
          #     port: 3000
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
