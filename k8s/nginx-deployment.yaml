apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-deployment
  template:
    metadata:
      labels:
        app: nginx-deployment
    spec:
      containers:
        - name: nginx-deployment
          image: nginx:alpine

          ports:
            - containerPort: 80

          volumeMounts:
            - name: nginx-config-vc
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf

          # resources: {}
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
              ephemeral-storage: "128Mi"
            limits:
              memory: "64Mi"
              cpu: "100m"
              ephemeral-storage: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

      volumes:
        - name: nginx-config-vc
          configMap:
            name: nginx-config
