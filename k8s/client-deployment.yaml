apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
  namespace: todo-app
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: client-deployment
  template:
    metadata:
      labels:
        app: client-deployment
    spec:
      automountServiceAccountToken: false
      containers:
        - name: client-deployment
          image: nicoareregistrytodoapp.azurecr.io/client:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: VITE_API_URL

          # resources: {}
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
              ephemeral-storage: "256Mi"
            limits:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "512Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
