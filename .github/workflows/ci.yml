name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            backend:
              - 'backend/**'

  client:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache client deps
        uses: actions/cache@v3
        with:
          path: client/node_modules
          key: client-${{ hashFiles('client/package-lock.json') }}

      - name: Install deps
        run: |
          cd client
          npm install

      - name: Lint
        run: |
          cd client
          npm run lint

      - name: Build
        run: |
          cd client
          npm run build

      - name: Unit tests
        run: |
          cd client
          npm test tests/unit


  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache backend deps
        uses: actions/cache@v3
        with:
          path: backend/node_modules
          key: backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Install deps
        run: |
          cd backend
          npm install

      # - name: Build
      #   run: |
      #     cd backend
      #     npm run build

      - name: Unit tests
        run: |
          cd backend
          npm test